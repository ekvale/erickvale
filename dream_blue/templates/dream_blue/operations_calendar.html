<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Operations calendar — Dream Blue</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #f4f6f8;
            --ink: #0f172a;
            --muted: #64748b;
            --card: #fff;
            --border: #e2e8f0;
            --accent: #0d47a1;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--ink); line-height: 1.45; }
        header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 24px; }
        header h1 { margin: 0; font-size: 1.25rem; font-weight: 650; letter-spacing: -0.02em; }
        nav { margin-top: 8px; font-size: 0.9rem; }
        nav a { color: var(--accent); margin-right: 16px; }
        .wrap { max-width: 1200px; margin: 0 auto; padding: 20px 24px 48px; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 12px 20px; align-items: center; margin-bottom: 20px;
            background: var(--card); padding: 14px 18px; border-radius: 10px; border: 1px solid var(--border); }
        .toolbar label { font-size: 0.85rem; color: var(--muted); }
        .toolbar select, .toolbar button { font: inherit; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: #fff; }
        .toolbar button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .legend { display: flex; flex-wrap: wrap; gap: 10px 16px; margin-bottom: 16px; font-size: 0.8rem; }
        .legend span { display: inline-flex; align-items: center; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
        .cal-wrap { display: grid; gap: 20px; }
        .cal-wrap.year-view { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
        .month-block { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px 16px; }
        .month-block h2 { margin: 0 0 10px; font-size: 1rem; text-align: center; color: var(--muted); font-weight: 600; }
        table.cal { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 0.72rem; }
        table.cal th { padding: 6px 2px; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border); }
        table.cal td { vertical-align: top; min-height: 72px; border: 1px solid var(--border); padding: 4px 3px; background: #fff; width: 14.28%; }
        table.cal td.out { background: #f8fafc; color: #cbd5e1; }
        table.cal td.today { box-shadow: inset 0 0 0 2px var(--accent); }
        .dnum { font-weight: 700; font-size: 0.75rem; color: var(--muted); margin-bottom: 3px; }
        .pill { display: block; font-size: 0.65rem; line-height: 1.25; padding: 2px 4px; margin-bottom: 2px; border-radius: 3px;
            color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: default; }
        .pill.range { opacity: 0.88; font-style: italic; }
        .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 28px; }
        .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px 20px; }
        .chart-card h3 { margin: 0 0 12px; font-size: 0.95rem; }
        #status { font-size: 0.85rem; color: var(--muted); margin-bottom: 12px; }
        .hint { font-size: 0.8rem; color: var(--muted); margin: 0 0 8px; }
    </style>
</head>
<body>
<header>
    <h1>Operations calendar</h1>
    <nav>
        <a href="/">Home</a>
        <a href="/admin/dream_blue/">Admin</a>
        <a href="{% url 'dream_blue:grantscout_dashboard' %}">GrantScout</a>
        <a href="{% url 'dream_blue:operations_calendar' %}">Calendar</a>
    </nav>
</header>
<div class="wrap">
    <p id="status">Loading…</p>
    <div class="toolbar">
        <span>
            <label>View</label><br>
            <button type="button" id="btn-month" class="active">Month</button>
            <button type="button" id="btn-year">Year</button>
        </span>
        <span>
            <label for="sel-year">Year</label><br>
            <select id="sel-year" aria-label="Year"></select>
        </span>
        <span id="month-picker-wrap">
            <label for="sel-month">Month</label><br>
            <select id="sel-month" aria-label="Month">
                <option value="1">January</option>
                <option value="2">February</option>
                <option value="3">March</option>
                <option value="4">April</option>
                <option value="5">May</option>
                <option value="6">June</option>
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>
        </span>
    </div>
    <div class="legend">
        {% for code, label, hex in legend %}
        <span title="{{ label }}"><i class="dot" style="background:{{ hex }}"></i> {{ label }}</span>
        {% endfor %}
    </div>
    <div id="calendar-root" class="cal-wrap"></div>
    <div class="charts">
        <div class="chart-card">
            <h3>Amounts by category</h3>
            <p class="hint">Sum of <code>amount</code> on active calendar rows (where set).</p>
            <canvas id="chart-amounts" height="240"></canvas>
        </div>
        <div class="chart-card">
            <h3>Row counts by category</h3>
            <p class="hint">Number of active items per type.</p>
            <canvas id="chart-counts" height="240"></canvas>
        </div>
    </div>
</div>
<script>
(function () {
    const API_EVENTS = "{% url 'dream_blue:operations_calendar_events_api' %}";
    const API_SUMMARY = "{% url 'dream_blue:operations_expense_summary_api' %}";
    const initialYear = {{ initial_year }};
    const initialMonth = {{ initial_month }};
    let viewMode = "{{ view_mode }}";
    const today = new Date();
    const todayY = today.getFullYear();
    const todayM = today.getMonth() + 1;
    const todayD = today.getDate();

    let chartAmt = null;
    let chartCnt = null;

    const selYear = document.getElementById('sel-year');
    const selMonth = document.getElementById('sel-month');
    const btnMonth = document.getElementById('btn-month');
    const btnYear = document.getElementById('btn-year');
    const monthPickerWrap = document.getElementById('month-picker-wrap');
    const root = document.getElementById('calendar-root');
    const statusEl = document.getElementById('status');

    for (let y = todayY - 2; y <= todayY + 3; y++) {
        const o = document.createElement('option');
        o.value = String(y);
        o.textContent = String(y);
        if (y === initialYear) o.selected = true;
        selYear.appendChild(o);
    }
    selMonth.value = String(initialMonth);

    function pad2(n) { return n < 10 ? '0' + n : String(n); }
    function iso(y, m, d) { return y + '-' + pad2(m) + '-' + pad2(d); }
    function firstExclusiveAfterMonth(y, m) {
        if (m === 12) return iso(y + 1, 1, 1);
        return iso(y, m + 1, 1);
    }
    function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }
    function weekdaySun0(y, m, d) { return new Date(y, m - 1, d).getDay(); }

    function setStatus(msg) { statusEl.textContent = msg; }

    async function fetchEvents(start, endExclusive) {
        const u = new URL(API_EVENTS, window.location.origin);
        u.searchParams.set('start', start);
        u.searchParams.set('end', endExclusive);
        const r = await fetch(u, { credentials: 'same-origin' });
        if (!r.ok) throw new Error(await r.text());
        return r.json();
    }

    function flatItemsForRendering(eventsFlat) {
        const out = [];
        for (const ev of eventsFlat) {
            if (ev.kind === 'milestone') {
                out.push({
                    kind: 'milestone',
                    start: ev.start,
                    label: ev.label,
                    color: ev.color,
                    title: ev.title,
                    amount: ev.amount,
                });
            } else if (ev.kind === 'range') {
                out.push({
                    kind: 'range',
                    start: ev.start,
                    endExclusive: ev.endExclusive,
                    label: ev.label,
                    color: ev.color,
                });
            }
        }
        return out;
    }

    function itemsOnDay(items, y, m, d) {
        const ds = iso(y, m, d);
        const res = [];
        for (const it of items) {
            if (it.kind === 'milestone' && it.start === ds) res.push(it);
            else if (it.kind === 'range' && ds >= it.start && ds < it.endExclusive) res.push(it);
        }
        return res;
    }

    function renderMonthTable(y, m, items) {
        const firstDow = weekdaySun0(y, m, 1);
        const dim = daysInMonth(y, m);
        const prevM = m === 1 ? 12 : m - 1;
        const prevY = m === 1 ? y - 1 : y;
        const nextM = m === 12 ? 1 : m + 1;
        const nextY = m === 12 ? y + 1 : y;
        const prevDim = daysInMonth(prevY, prevM);

        let html = '<table class="cal"><thead><tr>';
        ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach(function (w) {
            html += '<th>' + w + '</th>';
        });
        html += '</tr></thead><tbody>';

        let dom = 1;
        let tail = 1;
        const totalCells = Math.ceil((firstDow + dim) / 7) * 7;

        for (let cell = 0; cell < totalCells; cell++) {
            if (cell % 7 === 0) html += '<tr>';

            let cy, cm, cd, out = false;
            if (cell < firstDow) {
                out = true;
                cd = prevDim - firstDow + cell + 1;
                cy = prevY;
                cm = prevM;
            } else if (dom > dim) {
                out = true;
                cd = tail++;
                cy = nextY;
                cm = nextM;
            } else {
                cd = dom++;
                cy = y;
                cm = m;
            }

            const isToday = !out && cy === todayY && cm === todayM && cd === todayD;
            const cls = ((out ? 'out ' : '') + (isToday ? 'today ' : '')).trim();

            let pills = '';
            if (!out) {
                const list = itemsOnDay(items, y, m, cd);
                for (let i = 0; i < list.length; i++) {
                    const it = list[i];
                    const extra = it.title ? it.title : it.label;
                    const tip = extra + (it.amount ? ' · $' + it.amount : '');
                    const rk = it.kind === 'range' ? 'range' : 'milestone';
                    pills += '<span class="pill ' + rk + '" style="background:' + it.color + '" title="' +
                        tip.replace(/"/g, '&quot;') + '">' +
                        (it.kind === 'range' ? '▌ ' : '') + it.label + '</span>';
                }
            }

            html += '<td class="' + cls + '"><div class="dnum">' + cd + '</div>' + pills + '</td>';
            if (cell % 7 === 6) html += '</tr>';
        }
        html += '</tbody></table>';
        return html;
    }

    async function redraw() {
        root.innerHTML = '';
        setStatus('Loading calendar…');
        try {
            if (viewMode === 'month') {
                monthPickerWrap.style.display = '';
                const y = parseInt(selYear.value, 10);
                const m = parseInt(selMonth.value, 10);
                const start = iso(y, m, 1);
                const endEx = firstExclusiveAfterMonth(y, m);
                const data = await fetchEvents(start, endEx);
                const items = flatItemsForRendering(data.events);
                const block = document.createElement('div');
                block.className = 'month-block';
                const title = document.createElement('h2');
                title.textContent = new Date(y, m - 1, 1).toLocaleString(undefined, { month: 'long', year: 'numeric' });
                block.appendChild(title);
                block.insertAdjacentHTML('beforeend', renderMonthTable(y, m, items));
                root.appendChild(block);
                root.className = 'cal-wrap';
            } else {
                monthPickerWrap.style.display = 'none';
                const y = parseInt(selYear.value, 10);
                const start = iso(y, 1, 1);
                const endEx = iso(y + 1, 1, 1);
                const data = await fetchEvents(start, endEx);
                const items = flatItemsForRendering(data.events);
                root.className = 'cal-wrap year-view';
                for (let m = 1; m <= 12; m++) {
                    const block = document.createElement('div');
                    block.className = 'month-block';
                    const h2 = document.createElement('h2');
                    h2.textContent = new Date(y, m - 1, 1).toLocaleString(undefined, { month: 'long' });
                    block.appendChild(h2);
                    block.insertAdjacentHTML('beforeend', renderMonthTable(y, m, items));
                    root.appendChild(block);
                }
            }
            setStatus('Updated ' + new Date().toLocaleString());
        } catch (e) {
            setStatus('Error: ' + e.message);
        }
    }

    function updateToolbarMode() {
        if (viewMode === 'year') {
            btnYear.classList.add('active');
            btnMonth.classList.remove('active');
            monthPickerWrap.style.display = 'none';
        } else {
            btnMonth.classList.add('active');
            btnYear.classList.remove('active');
            monthPickerWrap.style.display = '';
        }
    }

    async function loadCharts() {
        const r = await fetch(API_SUMMARY, { credentials: 'same-origin' });
        if (!r.ok) return;
        const data = await r.json();
        const a = data.amountByType;
        const c = data.countByType;

        const opts = { responsive: true, plugins: { legend: { position: 'bottom' } } };

        if (chartAmt) chartAmt.destroy();
        chartAmt = new Chart(document.getElementById('chart-amounts'), {
            type: 'doughnut',
            data: {
                labels: a.labels,
                datasets: [{
                    data: a.values,
                    backgroundColor: a.colors,
                    borderWidth: 1,
                }],
            },
            options: opts,
        });

        if (chartCnt) chartCnt.destroy();
        chartCnt = new Chart(document.getElementById('chart-counts'), {
            type: 'bar',
            data: {
                labels: c.labels,
                datasets: [{
                    label: 'Rows',
                    data: c.values,
                    backgroundColor: c.colors,
                }],
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
            },
        });
    }

    btnMonth.addEventListener('click', function () {
        viewMode = 'month';
        updateToolbarMode();
        redraw();
    });
    btnYear.addEventListener('click', function () {
        viewMode = 'year';
        updateToolbarMode();
        redraw();
    });
    selYear.addEventListener('change', redraw);
    selMonth.addEventListener('change', redraw);

    if (viewMode === 'year') {
        updateToolbarMode();
    } else {
        monthPickerWrap.style.display = '';
    }

    redraw();
    loadCharts().catch(function () { setStatus(statusEl.textContent + ' (charts unavailable)'); });
})();
</script>
</body>
</html>
