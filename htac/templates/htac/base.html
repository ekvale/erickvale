{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full scroll-smooth">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}HTAC{% endblock %} — Eric Kvale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400..700;1,9..40,400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'erickvale/css/tw.css' %}?v=2">
  {% block extra_head %}{% endblock %}
</head>
<body class="htac-site min-h-full bg-slate-50 font-sans text-slate-800 antialiased">
  {% include "includes/site_nav.html" %}
  <main class="mx-auto max-w-5xl px-4 py-8 sm:px-6 lg:px-8 lg:py-10">
    {% block content %}{% endblock %}
  </main>
  {% include "includes/site_footer.html" %}
</body>
</html>
