<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Site{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
        integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
        crossorigin="anonymous">
  <style>
    body.htac-site {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: #222;
      background: #f4f7fa;
      min-height: 100vh;
    }
    body.htac-site .htac-topbar {
      background: #003865;
      color: #fff;
      padding: 0.65rem 0;
      margin-bottom: 0;
      box-shadow: 0 2px 8px rgba(0, 56, 101, 0.15);
    }
    body.htac-site .htac-topbar a {
      color: #cce4f0;
      font-weight: 500;
      margin-right: 1.25rem;
    }
    body.htac-site .htac-topbar a:hover {
      color: #fff;
      text-decoration: none;
    }
    body.htac-site .htac-topbar-inner {
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 1rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
    }
    body.htac-site .htac-brand {
      font-weight: 700;
      letter-spacing: 0.04em;
      font-size: 0.85rem;
      text-transform: uppercase;
      color: #7ecde0;
      margin-right: 1.5rem;
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="htac-site">
  <header class="htac-topbar">
    <div class="htac-topbar-inner">
      <span class="htac-brand">HTAC</span>
      <nav aria-label="Primary">
        <a href="{% url 'homepage' %}">Site home</a>
        <a href="{% url 'htac_public_about' %}">About &amp; pipeline</a>
        <a href="{% url 'htac_pipeline_step1' %}">Pipeline walkthrough</a>
        <a href="/api/htac/v1/">API</a>
      </nav>
    </div>
  </header>
  <main class="container py-4" style="max-width: 960px;">
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"
          integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct"
          crossorigin="anonymous"></script>
</body>
</html>
