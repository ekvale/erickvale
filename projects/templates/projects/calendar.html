{% extends "base_site.html" %}
{% block title %}Calendar — Eric Kvale{% endblock %}
{% block extra_head %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/main.min.css">
{% endblock %}
{% block main_inner %}
  <div class="mx-auto max-w-[1400px] px-4 py-8 sm:px-6 lg:px-8">
    {% if messages %}
      <div class="mb-6 space-y-2">
        {% for message in messages %}
          <div class="rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm text-emerald-800">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    <div class="mb-6 flex flex-col gap-4 border-b border-slate-200 pb-6 sm:flex-row sm:items-center sm:justify-between">
      <h1 class="text-2xl font-semibold tracking-tight text-slate-900">Calendar</h1>
      <a href="{% url 'projects:event_create' %}" class="inline-flex items-center justify-center rounded-lg bg-htac-navy px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-htac-teal">New event</a>
    </div>
    <div id="calendar" class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm"></div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.11/index.global.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var el = document.getElementById('calendar');
      if (!el || typeof FullCalendar === 'undefined') return;
      var calendar = new FullCalendar.Calendar(el, {
        initialView: 'dayGridMonth',
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,timeGridWeek,listWeek',
        },
        height: 'auto',
        events: {
          url: '{% url "projects:event_json" %}',
          method: 'GET',
          failure: function () {
            console.error('Failed to load calendar events');
          },
        },
      });
      calendar.render();
    });
  </script>
{% endblock %}
