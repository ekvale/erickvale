{% extends "base_site.html" %}
{% block title %}Delete contact — Eric Kvale{% endblock %}
{% block content %}
  <h1 class="text-2xl font-semibold tracking-tight text-slate-900">Delete contact</h1>
  <p class="mt-4 text-slate-700">Permanently delete <strong>{{ object }}</strong>? This cannot be undone.</p>
  <form method="post" class="mt-8 flex gap-3">
    {% csrf_token %}
    <button type="submit" class="rounded-lg bg-rose-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-rose-700">Delete</button>
    <a href="{% url 'contacts:detail' pk=object.pk %}" class="rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50">Cancel</a>
  </form>
{% endblock %}
