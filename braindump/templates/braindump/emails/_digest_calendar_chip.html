{# it, stream, pri #}
<div style="margin-top:4px;padding:4px 5px;border-radius:4px;border-left:3px solid {{ pri.accent }};background:{% if it.status == 'done' %}#ecfdf5{% else %}{{ stream.chip_bg }}{% endif %};border:1px solid {% if it.status == 'waiting' %}#fcd34d{% else %}{{ stream.card_border }}{% endif %};font-size:inherit;line-height:1.35;color:#24292f;">
    {% if it.status == 'done' %}<span style="color:#15803d;font-weight:700;">✓</span> {% endif %}{% firstof it.title it.body|truncatechars:48 "(untitled)" %}
    {% if it.status == 'waiting' %}<span style="color:#b45309;font-weight:600;"> (w)</span>{% endif %}
</div>
