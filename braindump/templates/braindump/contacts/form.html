<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if is_new %}New contact{% else %}Edit {{ contact.display_name }}{% endif %} · Brain dump</title>
    <style>
        :root { --bg: #0f1419; --card: #1a2332; --ink: #e6edf3; --muted: #8b949e; --accent: #58a6ff; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--ink); min-height: 100vh; }
        header { padding: 16px 20px; border-bottom: 1px solid #30363d; }
        header a { color: var(--accent); margin-right: 16px; font-size: 0.9rem; }
        h1 { margin: 0; font-size: 1.25rem; }
        .wrap { max-width: 560px; margin: 0 auto; padding: 24px 20px; }
        label { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin: 14px 0 6px; }
        input, select, textarea { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: var(--ink); font: inherit; }
        .err { color: #f85149; font-size: 0.85rem; margin-top: 4px; }
        button.primary { margin-top: 20px; font: inherit; font-weight: 600; padding: 12px 22px; border-radius: 8px; border: none; background: var(--accent); color: #0d1117; cursor: pointer; }
    </style>
</head>
<body>
<header>
    <a href="{% url 'braindump:contact_list' %}">← Contacts</a>
</header>
<div class="wrap">
    <h1>{% if is_new %}New contact{% else %}Edit contact{% endif %}</h1>
    <form method="post" action="">
        {% csrf_token %}
        {% for field in form %}
        <div>
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="err">{{ field.errors.0 }}</div>{% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="primary">{% if is_new %}Create{% else %}Save{% endif %}</button>
    </form>
</div>
</body>
</html>
